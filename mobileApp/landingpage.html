<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Whispers of the Kitchen</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=EB+Garamond:wght@400;600&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			/* [RESPONSIVE] Added overflow-x: hidden to guard against any edge-case horizontal scroll */
			html,
			body {
				height: 100%;
				margin: 0;
				overflow-x: hidden;
			}

			body {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;

				font-family: "EB Garamond", Georgia, "Times New Roman", Times, serif;
				font-weight: 400;
				text-align: center;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;

				background-image: url('image/background.jfif');
				background-size: cover;
				background-position: center;
				background-repeat: no-repeat;
				position: relative;
			}

			

			main {
				position: relative;
				width: 100%;
				max-width: 520px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 18px;
			}

			.cta {
				display: inline-flex;
				align-items: center;
				justify-content: center;

				width: min(280px, 100%);
				padding: 15px 20px;
				border-radius: 10px;
				background: linear-gradient(180deg, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.96));
				border: 1px solid rgba(255, 255, 255, 0.18);
				color: #fff;
				text-decoration: none;
				font-family: "Cormorant Garamond", "EB Garamond", Georgia, "Times New Roman", Times, serif;
				font-size: 1.05rem;
				font-weight: 600;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				font-variant: small-caps;
				backdrop-filter: blur(1px);

				position: relative;
				overflow: hidden;
				transform: translateZ(0);
				transition: transform 180ms ease, opacity 180ms ease, border-color 180ms ease;
				will-change: transform;
			}

			.cta::before {
				content: "";
				position: absolute;
				inset: -40% -60%;
				background: radial-gradient(
					circle at 30% 30%,
					rgba(255, 255, 255, 0.18),
					rgba(255, 255, 255, 0) 55%
				);
				opacity: 0.65;
				transform: rotate(-8deg);
				pointer-events: none;
			}

			.cta:hover {
				opacity: 0.96;
				transform: scale(1.02);
				border-color: rgba(255, 255, 255, 0.28);
			}

			.cta:active {
				transform: scale(0.99);
			}

			.cta:focus-visible {
				outline: 2px solid rgba(255, 255, 255, 0.9);
				outline-offset: 4px;
			}

			@media (prefers-reduced-motion: reduce) {
				.cta {
					transition: none;
				}
				.cta:hover,
				.cta:active {
					transform: none;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<a class="cta" href="home.html">Enter the Kitchen</a>
		</main>
	</body>
</html>
