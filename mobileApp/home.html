
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>All Recipes</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		.recipe-link {
			text-decoration: none !important;
			color: inherit !important;
		}
		.recipe-link:visited,
		.recipe-link:active,
		.recipe-link:focus {
			text-decoration: none !important;
			color: inherit !important;
		}
		/* [RESPONSIVE] Added overflow-x: hidden to prevent horizontal scroll on every viewport */
		html, body {
			background: #fff;
			margin: 0;
			padding: 0;
			font-family: 'Poppins', Arial, sans-serif;
			color: #222;
			min-height: 100vh;
			overflow-x: hidden;
		}
		/* [RESPONSIVE] Global box-sizing prevents padding from pushing elements outside their container */
		*, *::before, *::after {
			box-sizing: border-box;
		}
		/* [RESPONSIVE] All images scale proportionally and never exceed their container width */
		img {
			max-width: 100%;
			height: auto;
		}
		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
		}
		.container {
			   left: 0;
			   right: 0;
			   width: auto;
			   margin-left: 5%;
			   margin-right: 5%;
			   width: 90%;
			   max-width: none;
			margin: 0 auto;
			padding: 0 0 32px 0;
			box-sizing: border-box;
		}
		   /* [RESPONSIVE] Removed max-width: 430px — header now spans the full viewport at all sizes */
		   .header {
			   display: flex;
			   align-items: center;
			   justify-content: center;
			   position: fixed;
			   top: 0;
			   left: 0;
			   width: 100%;
			   max-width: 100%;
			   background: #fff;
			   z-index: 100;
			   padding: 24px 0 12px 0;
			   box-shadow: 0 2px 8px rgba(0,0,0,0.04);
		   }
		   .back-btn {
			   position: absolute;
			   left: 16px;
			   top: 50%;
			   transform: translateY(-50%);
			   background: linear-gradient(135deg, #ece9f6 0%, #f3f3f3 100%);
			   border: none;
			   border-radius: 14px;
			   width: 44px;
			   height: 44px;
			   display: flex;
			   align-items: center;
			   justify-content: center;
			   font-size: 1.5rem;
			   cursor: pointer;
			   box-shadow: 0 2px 8px rgba(0,0,0,0.07);
			   transition: background 0.2s, box-shadow 0.2s;
			   border: 1px solid #e0e0e0;
		   }
		   .back-btn:active {
			   background: #e0e0e0;
			   box-shadow: 0 1px 4px rgba(0,0,0,0.04);
		   }
		   .back-btn svg {
			   width: 22px;
			   height: 22px;
			   stroke: #444;
			   stroke-width: 2.2;
			   fill: none;
			   display: block;
		   }
		.title {
			font-family: 'Poppins', Arial, sans-serif;
			font-size: 1.5rem;
			font-weight: 600;
			letter-spacing: 0.01em;
			margin: 0 auto;
			color: #222;
		}
		   /* [RESPONSIVE] Replaced left:0 + max-width:430px + fixed width with left/right inset gutters.
		      The bar now fills the viewport minus 16px on each side at any screen width. */
		   .search-bar {
			   display: flex;
			   align-items: center;
			   background: #f3f3f3;
			   border-radius: 24px;
			   padding: 10px 18px;
			   margin: 0;
			   box-sizing: border-box;
			   position: fixed;
			   top: 76px;
			   left: 16px;
			   right: 16px;
			   width: auto;
			   z-index: 99;
			   box-shadow: 0 6px 24px 0 rgba(0,0,0,0.13), 0 1.5px 4px 0 rgba(0,0,0,0.07);
		   }
		.search-icon {
			display: flex;
			align-items: center;
			margin-right: 8px;
		}
		.search-icon svg {
			width: 22px;
			height: 22px;
			stroke: #888;
			stroke-width: 2.2;
			fill: none;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		.search-input {
			border: none;
			background: transparent;
			outline: none;
			font-size: 1rem;
			flex: 1;
			color: #222;
		}
		   .recipes-list {
			   display: flex;
			   flex-direction: column;
			   gap: 18px;
			   padding: 0 6px;
			   margin-top: 148px;
		   }
		   .recipe-card {
			   display: flex;
			   align-items: center;
			   min-height: 120px;
			   border-radius: 22px;
			   box-shadow: 0 8px 24px 0 rgba(0,0,0,0.13), 0 2px 8px 0 rgba(0,0,0,0.07);
			   padding: 20px 20px;
			   gap: 22px;
			   transition: box-shadow 0.2s;
		   }
		.recipes-list > a:nth-child(1) .recipe-card { background: #f8d3b8; }
		.recipes-list > a:nth-child(2) .recipe-card { background: #ced8af; }
		.recipes-list > a:nth-child(3) .recipe-card { background: #fae4cf; }
		.recipes-list > a:nth-child(4) .recipe-card { background: #fbe5b7; }
		.recipes-list > a:nth-child(5) .recipe-card { background: #ffcbd1; }
		.recipes-list > a:nth-child(6) .recipe-card { background: #fae4cf; }
		   .recipe-img {
			   width: 120px;
			   height: 120px;
			   border-radius: 18px;
			   background: #e9e9e9;
			   object-fit: cover;
			   flex-shrink: 0;
			   display: block;
			   box-shadow: 0 2px 8px rgba(0,0,0,0.06);
		   }
		.recipe-info {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 4px;
			min-width: 0;
		}
		.recipe-title {
			font-weight: 600;
			font-size: 1.25rem;
			color: #222;
			font-family: 'Poppins', Arial, sans-serif;
			white-space: normal;
			overflow: visible;
			text-overflow: unset;
			word-break: break-word;
		}
		.recipe-meta {
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 0.97rem;
			color: #666;
			font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
		}
		.meta-icon {
			margin-right: 3px;
			font-size: 1em;
		}
		.recipe-rating {
			color: #ffc107;
			font-weight: 600;
			font-size: 1em;
			margin-left: 2px;
			/* text-shadow removed */
		}
		.arrow {
			display: flex;
			align-items: center;
			margin-left: 10px;
		}
		.arrow svg {
			width: 28px;
			height: 28px;
			stroke: #888;
			stroke-width: 2.2;
			fill: none;
			stroke-linecap: round;
			stroke-linejoin: round;
			transition: stroke 0.2s;
		}
		.recipe-card:hover .arrow svg {
			stroke: #222;
		}
		.arrow {
			font-size: 1.3rem;
			color: #bbb;
			margin-left: 10px;
		}
		   /* [RESPONSIVE MOBILE] ≤480px: full mobile overhaul for recipe cards */
		   @media (max-width: 480px) {
			   /* Prevent any container overflow */
			   .container {
				   max-width: 100%;
			   }

			   /* Tighten list gap and remove extra side padding */
			   .recipes-list {
				   padding: 0 2px;
				   gap: 14px;
			   }

			   /* Stack card content vertically so image, text, and arrow
			      each get their own full-width row — no more cramped columns */
			   .recipe-card {
				   flex-direction: column;
				   align-items: center;
				   padding: 16px 16px 18px;
				   gap: 10px;
				   min-height: unset;
				   /* Needed so the arrow can be anchored to the corner */
				   position: relative;
			   }

			   /* Image fills the card width at a fixed height — scales on every device */
			   .recipe-img {
				   width: 100%;
				   height: 155px;
				   max-width: 100%;
				   border-radius: 16px;
				   flex-shrink: 0;
			   }

			   /* Info block spans full width and centres its children */
			   .recipe-info {
				   width: 100%;
				   align-items: center;
				   gap: 6px;
			   }

			   /* Slightly larger title now that it has the full card width */
			   .recipe-title {
				   font-size: 1.1rem;
				   text-align: center;
			   }

			   /* Centre the time and rating meta line */
			   .recipe-meta {
				   font-size: 0.9rem;
				   justify-content: center;
				   flex-wrap: wrap;
			   }

			   /* Pin the arrow to the top-right corner so it doesn't
			      break the column flow but stays accessible */
			   .arrow {
				   position: absolute;
				   top: 14px;
				   right: 14px;
				   margin-left: 0;
			   }
		   }
		   /* [RESPONSIVE] Tablet ≥768px: wider gutters, larger card images and type */
		   @media (min-width: 768px) {
			   .header {
				   padding: 28px 40px 16px 40px;
			   }
			   .search-bar {
				   left: 5%;
				   right: 5%;
			   }
			   .container {
				   max-width: 800px;
				   margin: 0 auto;
			   }
			   .recipes-list {
				   margin-top: 155px;
			   }
			   .recipe-card {
				   padding: 22px 28px;
				   gap: 28px;
			   }
			   .recipe-img {
				   width: 130px;
				   height: 130px;
			   }
			   .recipe-title {
				   font-size: 1.35rem;
			   }
		   }
		   /* [RESPONSIVE] Desktop ≥1024px: constrains list to a comfortable reading column */
		   @media (min-width: 1024px) {
			   .container {
				   max-width: 960px;
			   }
			   .search-bar {
				   /* Centre bar above content column */
				   left: calc(50% - 464px);
				   right: calc(50% - 464px);
			   }
			   .recipe-card {
				   gap: 32px;
				   padding: 24px 32px;
			   }
			   .recipe-title {
				   font-size: 1.4rem;
			   }
		   }
	</style>
</head>
<body>
	<div class="container">
		<div class="header">
			   <button class="back-btn" aria-label="Back" onclick="window.history.back()">
				   <svg viewBox="0 0 24 24"><polyline points="15 5 8 12 15 19"/></svg>
			   </button>
			<div class="title">All Recipes</div>
		</div>
		<div class="search-bar">
			<span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="18" y1="18" x2="15.5" y2="15.5"/></svg></span>
			<input type="text" class="search-input" placeholder="Search recipes..." oninput="filterRecipes()">
		</div>
		<div class="recipes-list" id="recipesList">
			   <a href="recipe1.html" class="recipe-link">
				   <div class="recipe-card" data-title="Howl's Breakfast Feast">
					   <img class="recipe-img" src="image/howlsbreakfast.jpg" alt="Howl's Breakfast Feast">
					   <div class="recipe-info">
						   <div class="recipe-title">Howl's Breakfast Feast</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>15 mins</span>
							   <span class="recipe-rating">★ 4.8</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>

			   <a href="recipe2.html" class="recipe-link">
				   <div class="recipe-card" data-title="Totoro’s Matcha Cloud">
					   <img class="recipe-img" src="image/totorosmatchacloud.jpg" alt="Totoro’s Matcha Cloud">
					   <div class="recipe-info">
						   <div class="recipe-title">Totoro’s Matcha Cloud</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>25 mins</span>
							   <span class="recipe-rating">★ 4.7</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>
			<!-- Spirited Away Dumplings card moved to end -->
			   <a href="recipe3.html" class="recipe-link">
				   <div class="recipe-card" data-title="Totoro's Bento Box">
					   <img class="recipe-img" src="image/totorosbento.jpg" alt="Totoro's Bento Box">
					   <div class="recipe-info">
						   <div class="recipe-title">Totoro's Bento Box</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>30 mins</span>
							   <span class="recipe-rating">★ 4.8</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>
			   <a href="recipe4.html" class="recipe-link">
				   <div class="recipe-card" data-title="Ponyo's Ramen Bowl">
					   <img class="recipe-img" src="image/ponyosramenbowl.jpg" alt="Ponyo's Ramen Bowl">
					   <div class="recipe-info">
						   <div class="recipe-title">Ponyo's Ramen Bowl</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>35 mins</span>
							   <span class="recipe-rating">★ 4.7</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>
			   <a href="recipe5.html" class="recipe-link">
				   <div class="recipe-card" data-title="Kiki's Strawberry Cake">
					   <img class="recipe-img" src="image/kikisstrawberrycake.jpg" alt="Kiki's Strawberry Cake">
					   <div class="recipe-info">
						   <div class="recipe-title">Kiki's Strawberry Cake</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>50 mins</span>
							   <span class="recipe-rating">★ 4.6</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>
			   <a href="recipe6.html" class="recipe-link">
				   <div class="recipe-card" data-title="Spirited Away Dumplings">
					   <img class="recipe-img" src="image/spirited away dumplings.jpg" alt="Spirited Away Dumplings">
					   <div class="recipe-info">
						   <div class="recipe-title">Spirited Away Dumplings</div>
						   <div class="recipe-meta">
							   <span><span class="meta-icon">⏱</span>40 mins</span>
							   <span class="recipe-rating">★ 4.9</span>
						   </div>
					   </div>
					   <span class="arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
				   </div>
			   </a>
		</div>
	</div>
	<script>
		function filterRecipes() {
			const input = document.querySelector('.search-input');
			const filter = input.value.trim().toLowerCase();
			const cards = document.querySelectorAll('.recipe-card');
			cards.forEach(card => {
				const title = card.getAttribute('data-title').toLowerCase();
				if (title.includes(filter)) {
					card.style.display = '';
				} else {
					card.style.display = 'none';
				}
			});
		}
	</script>
</body>
	<div class="floating-gif">
		<img src="https://media.giphy.com/media/smJ0MPiZfIojm/giphy.gif" alt="Totoro Floating Gif" />
	</div>
	<style>
		.floating-gif {
			position: fixed;
			right: 18px;
			bottom: 0;
			z-index: 200;
			pointer-events: none;
			display: flex;
			align-items: flex-end;
		}
		.floating-gif img {
			width: 110px;
			height: 110px;
			object-fit: contain;
			opacity: 0.97;
			border: none;
			box-shadow: none;
			background: none;
			margin-bottom: -6px;
			display: block;
		}
		/* Floating animation removed */
	</style>
</html>
